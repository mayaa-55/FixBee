<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fixbee – تسجيل الدخول</title>
<link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
<main class="auth-shell">
  <section class="auth-brand-panel">
    <div class="auth-brand">
      <div class="ab-icon">🏠</div>
      <div>
        <h1>Fixbee</h1>
        <p>منصة الصيانة المنزلية الذكية</p>
      </div>
    </div>
    <div class="auth-copy">
      <h2>إدارة طلبات الصيانة تبدأ من هنا</h2>
      <p>سجل دخولك لمتابعة الطلبات، الإشعارات، وحالة الخدمات من لوحة واحدة منظمة.</p>
    </div>
    <div class="auth-highlights">
      <div><strong>24/7</strong><span>متابعة الطلبات</span></div>
      <div><strong>8</strong><span>خدمات منزلية</span></div>
      <div><strong>فوري</strong><span>إشعارات الحالة</span></div>
    </div>
  </section>

  <section class="auth-card" aria-label="تسجيل الدخول أو إنشاء حساب">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">تسجيل الدخول</button>
      <button class="auth-tab"        onclick="switchTab('register')">إنشاء حساب</button>
    </div>

    <div id="auth-error" class="auth-error"></div>

    <!-- LOGIN -->
    <div id="form-login" class="auth-form active">
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input class="form-control" type="email" id="login-email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input class="form-control" type="password" id="login-password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-wide" onclick="handleLogin()">🔐 تسجيل الدخول</button>
    </div>

    <!-- REGISTER -->
    <div id="form-register" class="auth-form">
      <div class="form-group">
        <label>الاسم الكامل</label>
        <input class="form-control" type="text" id="reg-name" placeholder="محمد أحمد">
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input class="form-control" type="email" id="reg-email" placeholder="example@email.com">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input class="form-control" type="password" id="reg-password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-wide" onclick="handleRegister()">✅ إنشاء حساب</button>
    </div>

    <div class="demo-box" aria-label="حسابات تجريبية">
      <button type="button" class="demo-fill" onclick="fillUser()">
        <span>مستخدم</span>
        <b>user@demo.com / 123456</b>
      </button>
      <button type="button" class="demo-fill admin-demo" onclick="fillAdmin()">
        <span>أدمن</span>
        <b>admin@demo.com / admin123</b>
      </button>
    </div>
  </section>
</main>

<script src="auth.js"></script>
</body>
</html>
